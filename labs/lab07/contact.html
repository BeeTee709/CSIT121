<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 07 — Red Bull Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Lab 07- HTML tables and Forms</h1>
</header>

<nav class="topnav">
    <a href="tierlist.html">Tier List</a>
    <a href="../../labs.html">Labs Home</a>
    <a href="../../index.html">Main Home</a>
</nav>

<main>

<section class="section">
    <h2> What do you think?</h2>

    <form>

    <label for="name">Your Name</label>
     <input type="text" id="name" name="name">

     <label for="email">Email Address</label>
    <input type="email" id="email" name="email">

    <label for="drink">Do you drink Red Bull?</label>
        <select id="drink" name="drink">
            <option value="yes">Yes</option>
            <option value="no">No</option>
            <option value="sometimes">Sometimes</option>
        </select>

    <label for="favorite">What is your favorite Red Bull flavor?</label>
    <input type="text" id="favorite" name="favorite">

    <label for="create">If you could create a new flavor that still tasted like Red Bull, what would it be?</label>
    <input type="text" id="create" name="create">

    <label for="comments">Additional Comments</label>
     <textarea id="comments" name="comments"></textarea>

    <input type="submit" value="Submit">

    </form>
</section>

</main>

<footer>
    <p>Lab 07 — Contact Form</p>
</footer>

</body>

</html>
